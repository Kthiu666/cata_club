services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-usuario}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-cataclub_db}
    ports:
      - "5433:5432"
    volumes:
      - cataclub_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-usuario} -d ${POSTGRES_DB:-cataclub_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # UI web para ver correos capturados
    environment:
      MP_MAX_MESSAGES: 500

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment: &backend_env
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-usuario}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-cataclub_db}
      REDIS_URL: redis://redis:6379/0
      # JWT_SECRET_KEY: MUST be set in .env — the backend refuses to start
      # if it detects a placeholder or missing secret (fail-fast validator).
      JWT_SECRET_KEY: "${JWT_SECRET_KEY:?Error: define JWT_SECRET_KEY in .env (run: openssl rand -hex 32)}"
      JWT_ALGORITMO: HS256
      JWT_EXPIRA_MINUTOS: 60
      JWT_REFRESH_EXPIRA_DIAS: 7
      CORS_ORIGENES: http://localhost:3000
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      CLOUDINARY_CARPETA_COMPROBANTES: cataclub/comprobantes
      CLOUDINARY_CARPETA_VOUCHERS: cataclub/vouchers
      CLOUDINARY_CARPETA_FOTOS_PERFIL: cataclub/fotos_perfil
      CELERY_HORA_AUTOMATIZACIONES: "02:30"
      AMBIENTE: ${AMBIENTE:-production}
      # --- Correo / SMTP -----------------------------------------------------
      # En desarrollo con Docker se usa el contenedor mailpit (SMTP sin auth).
      # En producción sobrescribí estas variables con tu proveedor SMTP real.
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-no-reply@cataclub.com}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-false}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "
        uv run alembic upgrade head;
        if [ \"$${AMBIENTE:-production}\" = \"development\" ]; then
          uv run python scripts/seed_dev_base.py;
        fi &&
        uv run uvicorn main:app --host 0.0.0.0 --port 8000
      "

  celery-worker:
    build: ./backend
    restart: unless-stopped
    environment: *backend_env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_started
    command: uv run celery -A app.infraestructura.tareas.celery_app worker --loglevel=info

  celery-beat:
    build: ./backend
    restart: unless-stopped
    environment: *backend_env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_started
    command: uv run celery -A app.infraestructura.tareas.celery_app beat --loglevel=info

  frontend:
    restart: unless-stopped
    build:
      context: ./frontend
      # The default bridge network's embedded DNS resolver fails to reach
      # external registries (npm, Google Fonts) in some setups even when the
      # host itself has working internet — build on the host's network stack
      # instead, which sidesteps that resolver entirely. Build-time only;
      # doesn't affect the running container's network at all.
      network: host
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
        NEXT_PUBLIC_APP_NAME: Cata Club Admin
        NEXT_PUBLIC_USE_MOCKS: "false"
    ports:
      - "3000:3000"
    environment:
      # Server-only — the Next.js BFF (src/app/api/auth/**) calls FastAPI directly
      # over the compose network, not through localhost.
      BACKEND_API_URL: http://backend:8000/api/v1
    depends_on:
      backend:
        condition: service_healthy

volumes:
  cataclub_db_data:
