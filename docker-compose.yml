services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: usuario
      POSTGRES_PASSWORD: password
      POSTGRES_DB: cataclub_db
    ports:
      - "5433:5432"
    volumes:
      - cataclub_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U usuario -d cataclub_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://usuario:password@db:5432/cataclub_db
      REDIS_URL: redis://redis:6379/0
      # Dev-only secret — never reuse this value outside local docker-compose.
      JWT_SECRET_KEY: dev-only-insecure-secret-do-not-use-in-production-000000
      CORS_ORIGENES: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "uv run python -c 'from app.infraestructura.db import crear_tablas; crear_tablas()' &&
             uv run python scripts/seed_dev_admin.py &&
             uv run uvicorn main:app --host 0.0.0.0 --port 8000"

volumes:
  cataclub_db_data:
