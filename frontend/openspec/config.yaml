schema: spec-driven

context: |
  Tech stack: Next.js 14.2 (App Router), TypeScript 5.4, Tailwind CSS 3.4.4, pnpm 10.33.2
  Architecture: App Router pages under src/app/, shared globals.css utility classes (no
    Button/Card/Badge/Input component abstraction yet), path alias @/ -> src/
  Testing: Vitest 2.1.9 (pnpm test = vitest run), @testing-library/react, Playwright E2E
  Style: Tailwind utility-first, cata-* namespace in tailwind.config.ts, darkMode: "class"
    configured but unused (no toggle — literal hardcoded dark classes today)

rules:
  proposal:
    - Include rollback plan for risky changes
    - No colors outside the declared brand palette family may be introduced (PDF 01,
      non-negotiable)
    - Explicitly separate in-scope light-surface migration from deferred vibrant
      brand-hue activation
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
    - Respect the 400-changed-line PR review budget; split large views (payments,
      student, student/enroll) into their own PRs or sub-slices
  apply:
    guidelines:
      - Follow existing code patterns
      - Strict TDD: write/adjust a failing test before implementation changes where
        testable behavior exists; visual/CSS-only changes are verified via build +
        manual/E2E smoke instead
    tdd: true
    test_command: "pnpm test"
  verify:
    test_command: "pnpm test"
    build_command: "pnpm build"
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas
